<!doctype html>
<html>
<head>
    <title>Library System Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
        }
        .container {
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 8px;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }
        button {
            padding: 15px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn-books {
            background: #28a745;
            color: white;
        }
        .btn-books:hover {
            background: #218838;
        }
        .btn-members {
            background: #007bff;
            color: white;
        }
        .btn-members:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Library System</h2>
        <p style="text-align: center; color: #666;">Select an option to generate SQL:</p>
        <div class="button-group">
            <button class="btn-books" onclick="generateBooks()">Generate Books SQL</button>
            <button class="btn-members" onclick="generateMembers()">Generate Members SQL</button>
        </div>
    </div>
    <script src="generator.js"></script>
</body>
</html>
